<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World Visualization</title>
  <style>
    :root {
      --ink: #f8fbff;
      --cyan: #49f2ff;
      --gold: #ffcf5a;
      --rose: #ff6f91;
      --green: #8cffb4;
      --bg: #07080f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 20%, rgba(73, 242, 255, 0.22), transparent 28%),
        radial-gradient(circle at 80% 16%, rgba(255, 111, 145, 0.18), transparent 30%),
        radial-gradient(circle at 52% 84%, rgba(140, 255, 180, 0.16), transparent 32%),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.045) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle, black 10%, transparent 72%);
      animation: driftGrid 14s linear infinite;
    }

    main {
      width: min(92vw, 980px);
      min-height: 72vh;
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .orbital {
      position: absolute;
      width: min(78vw, 720px);
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 50%;
      animation: spin 18s linear infinite;
    }

    .orbital::before,
    .orbital::after {
      content: "";
      position: absolute;
      width: 16px;
      aspect-ratio: 1;
      border-radius: 50%;
      box-shadow: 0 0 24px currentColor;
    }

    .orbital::before {
      top: 11%;
      left: 18%;
      color: var(--cyan);
      background: var(--cyan);
    }

    .orbital::after {
      right: 6%;
      bottom: 30%;
      color: var(--gold);
      background: var(--gold);
    }

    .word-cloud {
      position: absolute;
      inset: 0;
      z-index: -1;
    }

    .word-cloud span {
      position: absolute;
      color: rgba(255, 255, 255, 0.13);
      font-size: clamp(0.9rem, 2.6vw, 1.6rem);
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      animation: floatWord 8s ease-in-out infinite;
    }

    .word-cloud span:nth-child(1) { top: 10%; left: 12%; color: rgba(73, 242, 255, 0.34); animation-delay: -1s; }
    .word-cloud span:nth-child(2) { top: 23%; right: 8%; color: rgba(255, 207, 90, 0.34); animation-delay: -4s; }
    .word-cloud span:nth-child(3) { bottom: 18%; left: 6%; color: rgba(255, 111, 145, 0.32); animation-delay: -2s; }
    .word-cloud span:nth-child(4) { bottom: 9%; right: 14%; color: rgba(140, 255, 180, 0.31); animation-delay: -6s; }
    .word-cloud span:nth-child(5) { top: 48%; left: 2%; animation-delay: -3s; }
    .word-cloud span:nth-child(6) { top: 58%; right: 1%; animation-delay: -7s; }

    .phrase {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(0.18em, 1.4vw, 0.34em);
      font-size: clamp(3.8rem, 13vw, 10rem);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-align: center;
      filter: drop-shadow(0 0 28px rgba(73, 242, 255, 0.34));
    }

    .phrase::before,
    .phrase::after {
      content: "hello world!";
      position: absolute;
      inset: 0;
      opacity: 0.72;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .phrase::before {
      color: var(--cyan);
      transform: translate(-0.035em, -0.018em);
      clip-path: inset(0 0 56% 0);
      animation: glitchTop 2.8s steps(2, end) infinite;
    }

    .phrase::after {
      color: var(--rose);
      transform: translate(0.035em, 0.018em);
      clip-path: inset(48% 0 0 0);
      animation: glitchBottom 3.4s steps(2, end) infinite;
    }

    .letter {
      display: inline-block;
      color: transparent;
      background: linear-gradient(120deg, var(--ink), var(--cyan), var(--gold), var(--rose), var(--ink));
      background-size: 260% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      animation: shimmer 3.2s linear infinite, bounce 2.6s ease-in-out infinite;
      animation-delay: calc(var(--i) * 75ms), calc(var(--i) * 95ms);
      text-shadow: 0 0 38px rgba(255, 255, 255, 0.18);
    }

    .letter.space {
      width: 0.25em;
    }

    .ring {
      position: absolute;
      width: min(92vw, 880px);
      height: min(38vw, 280px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 50%;
      transform: rotate(-7deg);
      box-shadow:
        inset 0 0 30px rgba(73, 242, 255, 0.09),
        0 0 42px rgba(255, 111, 145, 0.12);
      z-index: -1;
    }

    .ring:nth-of-type(2) {
      width: min(74vw, 700px);
      height: min(27vw, 210px);
      transform: rotate(11deg);
      border-color: rgba(255, 207, 90, 0.22);
    }

    .caption {
      position: absolute;
      bottom: clamp(1rem, 4vh, 2rem);
      display: flex;
      align-items: center;
      gap: 0.7rem;
      color: rgba(248, 251, 255, 0.74);
      font-size: clamp(0.82rem, 2vw, 1rem);
      letter-spacing: 0;
    }

    .caption::before,
    .caption::after {
      content: "";
      width: clamp(32px, 9vw, 88px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(248, 251, 255, 0.58));
    }

    .caption::after {
      background: linear-gradient(90deg, rgba(248, 251, 255, 0.58), transparent);
    }

    @keyframes shimmer {
      to { background-position: 260% 0; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      45% { transform: translateY(-0.12em) rotate(-1.5deg); }
      70% { transform: translateY(0.04em) rotate(1deg); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes floatWord {
      0%, 100% { transform: translate3d(0, 0, 0) rotate(-2deg); opacity: 0.48; }
      50% { transform: translate3d(0, -22px, 0) rotate(3deg); opacity: 0.9; }
    }

    @keyframes driftGrid {
      to { background-position: 48px 48px; }
    }

    @keyframes glitchTop {
      0%, 86%, 100% { transform: translate(-0.035em, -0.018em); }
      88% { transform: translate(-0.07em, 0.01em); }
      90% { transform: translate(0.04em, -0.025em); }
    }

    @keyframes glitchBottom {
      0%, 80%, 100% { transform: translate(0.035em, 0.018em); }
      83% { transform: translate(0.08em, -0.012em); }
      86% { transform: translate(-0.04em, 0.03em); }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 560px) {
      main {
        min-height: 82vh;
      }

      .phrase {
        font-size: clamp(3.6rem, 20vw, 6.8rem);
      }

      .caption {
        bottom: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <main aria-label="Animated visualization of the words hello world">
    <div class="word-cloud" aria-hidden="true">
      <span>hello</span>
      <span>world</span>
      <span>hello</span>
      <span>world</span>
      <span>hello</span>
      <span>world</span>
    </div>
    <div class="orbital" aria-hidden="true"></div>
    <div class="ring" aria-hidden="true"></div>
    <div class="ring" aria-hidden="true"></div>
    <h1 class="phrase" aria-label="hello world!">
      <span class="letter" style="--i: 0">h</span>
      <span class="letter" style="--i: 1">e</span>
      <span class="letter" style="--i: 2">l</span>
      <span class="letter" style="--i: 3">l</span>
      <span class="letter" style="--i: 4">o</span>
      <span class="letter space" style="--i: 5" aria-hidden="true"></span>
      <span class="letter" style="--i: 6">w</span>
      <span class="letter" style="--i: 7">o</span>
      <span class="letter" style="--i: 8">r</span>
      <span class="letter" style="--i: 9">l</span>
      <span class="letter" style="--i: 10">d</span>
      <span class="letter" style="--i: 11">!</span>
    </h1>
    <div class="caption" aria-hidden="true">a tiny signal from the screen</div>
  </main>
</body>
</html>
